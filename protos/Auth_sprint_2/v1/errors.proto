syntax = "proto3";

package auth_sprint_2.v1;

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  TOKEN_INVALID = 1;
  TOKEN_EXPIRED = 2;
  TOKEN_BLACKLISTED = 3;
  TOKEN_IS_REFRESH = 4;
  PERMISSION_DENIED = 5;
  USER_NOT_FOUND = 6;
  USER_INACTIVE = 7;
}

message Error {
  ErrorCode code = 1;
  string message = 2;
}
